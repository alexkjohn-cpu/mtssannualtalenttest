<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MTSS Talent Test</title><style>
:root{--c:#9B1C2E;--g:#C9922A;--i:#FAF7F2;--d:#1F1F23;--s:#3D3D4A;--m:#E8E4DC;--t:#1A6B6B;--a:#6B2D8B}*{box-sizing:border-box}body{margin:0;background:var(--i);color:var(--d);font-family:Georgia,serif}button,input,select,textarea{font:inherit}button{cursor:pointer}.nav{display:flex;flex-wrap:wrap;align-items:center;background:var(--c);color:white;box-shadow:0 2px 12px #0004;position:sticky;top:0;z-index:5}.brand{padding:13px 22px;min-width:165px}.brand b{font-size:18px}.brand div{font:10px Arial,sans-serif;letter-spacing:2px;opacity:.85}.nav button{border:0;border-bottom:3px solid transparent;background:transparent;color:white;padding:15px 16px 12px;font:13px Arial,sans-serif}.nav button.on{background:#fff2;border-bottom-color:var(--g);font-weight:700}.grow{flex:1}main{max-width:1180px;margin:auto;padding:28px 22px 44px}h1,h2,h3{margin-top:0;color:var(--c)}p,label,td,th,input,select,textarea,button,.sans{font-family:Arial,sans-serif}.panel{background:white;border-radius:8px;padding:22px;box-shadow:0 2px 12px #0001}.grid{display:grid;gap:16px}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.auto{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}.field label{display:block;margin-bottom:5px;font-size:11px;font-weight:700;color:var(--s);text-transform:uppercase;letter-spacing:.5px}input,select,textarea{width:100%;border:1.5px solid var(--m);border-radius:7px;padding:9px 11px;background:white;color:var(--d);font-size:14px}.btn{border:0;border-radius:7px;padding:10px 16px;background:var(--c);color:white;font:700 13px Arial,sans-serif}.btn.alt{background:var(--m);color:var(--s)}.btn.teal{background:var(--t)}.btn.out{background:white;color:var(--s);border:1.5px solid var(--m)}.btn.danger{background:white;color:#c0392b;border:1.5px solid #c0392b}.toolbar{display:flex;gap:12px;flex-wrap:wrap;margin:18px 0}.toolbar>*{flex:1 1 160px}.kpi{background:white;border-radius:8px;padding:18px;border-left:4px solid var(--c);box-shadow:0 2px 10px #0001}.kpi b{display:block;font-size:31px;color:var(--c)}.tag{display:inline-flex;border-radius:999px;padding:2px 8px;font:700 11px Arial,sans-serif;background:var(--m);color:var(--s);white-space:nowrap}.tag.c{background:var(--c);color:white}.tag.t{background:#e8f5f5;color:var(--t)}.tag.y{background:#fff3cd;color:#856404}table{width:100%;border-collapse:collapse;font:13px Arial,sans-serif}th{background:var(--d);color:white;text-align:left;padding:11px 12px;font-size:11px}td{padding:9px 12px;border-bottom:1px solid var(--m);vertical-align:top}tr:nth-child(even){background:var(--i)}.toast{position:fixed;right:20px;top:20px;z-index:20;background:var(--t);color:white;border-radius:8px;padding:12px 18px;box-shadow:0 4px 20px #0004;font:14px Arial,sans-serif}.toast.err{background:#c0392b}.toast.info{background:var(--s)}.modalbg{position:fixed;inset:0;background:#0008;z-index:15;display:flex;align-items:center;justify-content:center;padding:18px}.modal{width:min(520px,100%);background:white;border-radius:8px;padding:24px;box-shadow:0 8px 40px #0005}.slot{display:grid;grid-template-columns:100px 1fr auto;gap:12px;align-items:center;border-bottom:1px solid var(--m);padding:12px 0}.empty{text-align:center;padding:54px 18px;color:var(--s);font-family:Arial,sans-serif}.events button{width:100%;display:flex;justify-content:space-between;text-align:left;margin-bottom:6px;padding:9px 11px;background:white;border:2px solid var(--m);border-radius:7px;font:12px Arial,sans-serif}.events button.on{border-color:var(--c);background:#fdf0f2;color:var(--c);font-weight:700}.events button.saved{border-color:var(--t);background:#eef8f8;color:var(--t);font-weight:700}.row{background:var(--i);border:1.5px solid var(--m);border-radius:8px;padding:14px;margin-bottom:10px}@media(max-width:760px){main{padding:20px 14px}.two,.three{grid-template-columns:1fr}.slot{grid-template-columns:1fr}.wrap{overflow-x:auto}.brand{width:100%}}@media print{.nav,.toolbar,.btn,.toast{display:none!important}main{max-width:none}.panel,.kpi{box-shadow:none;border:1px solid #ddd}}
</style></head><body><div id="app"></div><script>
const DIO=['Kunnamkulam-Malabar Diocese','Kottayam-Kochi Diocese','Ranni-Nilackal Diocese','Niranam-Maramon Diocese','Chengannur-Mavelikkara Diocese','Adoor Diocese','Kottarakara-Punalur Diocese','Thiruvananthapuram-Kollam Diocese','Chennai-Bangalore Diocese','Mumbai Diocese','Delhi Diocese','Overseas'];
const CLS=[['N','Nursery'],['S','Sisuvakup'],['B','Balavakup'],['K','Kumaravakup'],['M','Madhyavakup'],['J','Jeshtavakup'],['Y','Yuvavakup'],['TM','Teachers (Male)'],['TF','Teachers (Female)']];
const ITEMS=[{id:'ST',name:'Story Telling',cat:'Story Telling',el:['S','B','K'],time:'',venue:'Hall A'},{id:'EW',name:'Essay Writing',cat:'Language',el:['M','J','Y'],time:'',venue:'Classroom 1'},{id:'MU',name:'Music',cat:'Arts',el:['K','M','J','Y'],genderEl:['K','M','J','Y'],genderCategories:['Male','Female'],time:'',venue:'Main Stage'},{id:'EL',name:'Elocution',cat:'Language',el:['M','J','Y'],time:'',venue:'Hall B'},{id:'TEW',name:'Teachers Essay Writing',cat:'Language',el:['TM','TF'],time:'',venue:'Classroom 2'},{id:'DS',name:'Divasangeetham',cat:'Group Item',el:['K','M','J','Y'],categoryGroups:[{id:'Junior',label:'Junior',classes:['K','M'],limit:2},{id:'Senior',label:'Senior',classes:['J','Y'],limit:2}],time:'',venue:'Main Stage'}];
const K='mtss_talent_test_data_v3',AUTH=()=>({admin:'admin2026',users:{},userAccounts:[]}),CERT=()=>({title:'Certificate of Merit',body:'This is to certify that {name} of {School} won 1st place in {event}.',issuer:'Mar Thoma Sunday School Samajam',signatory:'General Secretary'}),S={page:'home',session:{role:null,email:'',diocese:''},otp:'',mode:'user',loginError:'',auth:AUTH(),certTpl:CERT(),students:[],schools:[],marks:{},programme:ITEMS.map(x=>({...x})),f:{diocese:'All',classId:'All',item:'All',q:''},toast:null,modal:null,reg:null,edit:null};
const E=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const id=()=>Math.random().toString(36).slice(2,10);
const pad=n=>String(n).padStart(3,'0');
const cn=x=>(CLS.find(c=>c[0]===x)||['',x])[1];
const clsIndex=x=>{let n=CLS.findIndex(c=>c[0]===x);return n<0?999:n};
const itn=x=>((S.programme||ITEMS).find(i=>i.id===x)||{name:x}).name;
const gr=m=>m>=90?'A':m>=75?'B':m>=60?'C':m>=45?'D':'F';
function save(){localStorage.setItem(K,JSON.stringify({students:S.students,schools:S.schools,marks:S.marks,programme:S.programme,auth:S.auth,certTpl:S.certTpl}))}
function load(){try{let d=JSON.parse(localStorage.getItem(K)||'{}'),a=AUTH();S.students=d.students||[];S.schools=d.schools||[];S.marks=d.marks||{};S.programme=d.programme||S.programme;S.certTpl={...CERT(),...(d.certTpl||{})};if(!localStorage.getItem(K+'_timings_cleared')){S.programme=S.programme.map(x=>({...x,time:''}));localStorage.setItem(K+'_timings_cleared','1')}S.auth={...a,...(d.auth||{}),users:{...a.users,...((d.auth||{}).users||{})},userAccounts:((d.auth||{}).userAccounts||[]).map(u=>({...u,email:String(u.email||'').toLowerCase()}))}}catch(e){}}
function msg(m,t=''){S.toast={m,t};render();setTimeout(()=>{S.toast=null;render()},2500)}
function page(p){S.page=p;S.modal=null;render()}
function saveProgrammeBackend(){if(!S.session.token||S.session.role!=='admin')return;apiCall('saveProgramme',{token:S.session.token,programme:S.programme},r=>{if(Array.isArray(r.programme))S.programme=r.programme;save()},m=>msg(m,'err'))}
function filt(){return S.students.filter(s=>(S.session.role!=='user'||!S.session.diocese||s.diocese===S.session.diocese)&&(S.f.diocese==='All'||s.diocese===S.f.diocese)&&(S.f.classId==='All'||s.classId===S.f.classId)&&(!S.f.q||s.name.toLowerCase().includes(S.f.q.toLowerCase())||s.regNo.toLowerCase().includes(S.f.q.toLowerCase())))}
function render(){document.getElementById('app').innerHTML=`<div class="nav"><div class="brand"><b>+ MTSS</b><div>TALENT TEST</div></div>${nav()}<div class="grow"></div>${S.session.role&&S.session.role!=='otp'?'<button onclick="logout()">Logout</button>':''}</div>${S.toast?`<div class="toast ${S.toast.t}">${E(S.toast.m)}</div>`:''}${S.modal?markModal():''}${S.edit?editModal():''}<main>${body()}</main>`}
function body(){if(S.page==='dashboard'&&S.session.role==='admin')return dash();if(S.page==='register'&&S.session.role)return reg();if(S.page==='programme'&&S.session.role)return prog();if(S.page==='marks'&&S.session.role==='admin')return marks();if(S.page==='results'&&S.session.role)return results();if(S.page==='winners'&&S.session.role)return winners();if(S.page==='admin'&&S.session.role==='admin')return admin();return home()}
function home(){
  let html = `<div style="max-width:560px;margin:auto"><h1>MTSS Talent Test Login</h1><p>Admin manages participants, programme, marks and exports. Users register participants for one Diocese.</p><div class="panel"><div style="display:grid;grid-template-columns:1fr 1fr;background:var(--m);border-radius:8px;padding:4px;margin-bottom:18px"><button class="btn ${S.mode==='admin'?'':'out'}" style="border-radius:6px" onclick="S.mode='admin';S.loginError='';render()">Admin</button><button class="btn ${S.mode==='user'?'':'out'}" style="border-radius:6px" onclick="S.mode='user';S.loginError='';render()">User</button></div>${S.loginError?`<div style="background:#fdecea;color:#c0392b;border:1.5px solid #f5c6cb;border-radius:7px;padding:10px 12px;margin-bottom:16px;font:13px Arial,sans-serif">${E(S.loginError)}</div>`:''}${S.mode==='admin'?`<h2>Admin Login</h2><div class="grid" style="grid-template-columns:1fr auto"><div class="field"><label>Admin Password</label><input id="admin" type="password"></div><button class="btn" style="align-self:end" onclick="loginAdmin()">Login</button></div>`:`<h2>Diocese User Login</h2><div class="grid two"><div class="field"><label>Diocese</label><select id="dio"><option value="">Select Diocese</option>${DIO.map(d=>`<option ${S.session.diocese===d?'selected':''}>${E(d)}</option>`).join('')}</select></div><div class="field"><label>User ID</label><input id="email" type="email" value="${E(S.session.email)}"></div><div class="field" style="grid-column:1/-1"><label>Password</label><input id="upass" type="password"></div></div><button class="btn" style="margin-top:16px" onclick="loginUser()">Login</button>`}</div></div>`;
  html += S.mode==='user' ? otpLoginPanel() : '';
  return html
    .replace('>Admin</button>','>🛡️ Admin</button>')
    .replace('>User</button>','>👤 User</button>')
    .replace('>Send OTP</button>','>✉️ Send OTP</button>')
    .replace('>Verify OTP</button>','>✅ Verify OTP</button>')
    .replace('<h1>MTSS Talent Test Login</h1>','<div class="home-hero"><div class="home-emblem">✦</div><div><div class="home-kicker">MAR THOMA SUNDAY SCHOOL SAMAJAM</div><h1>Annual Talent Test</h1><p class="home-welcome">Welcome to the Talent Test Management Portal</p></div></div>')
    .replace('<p>Admin manages participants, programme, marks and exports. Users register participants for one Diocese.</p>','');
}
function applyBackendData(r){
  if(Array.isArray(r.students))S.students=r.students;
  if(r.marks&&typeof r.marks==='object')S.marks=r.marks;
  if(Array.isArray(r.programme))S.programme=r.programme;
  if(Array.isArray(r.schools))S.schools=r.schools;
  if(Array.isArray(r.users))S.auth.userAccounts=r.users.filter(u=>String(u.Role||'').toLowerCase()==='user').map(u=>({email:String(u.Email||'').toLowerCase(),diocese:String(u.Diocese||''),name:String(u.Name||''),active:uiTruthy(u.Active),otpAllowed:uiTruthy(u.OtpAllowed)}));
  if(r.certificateTemplates&&Object.keys(r.certificateTemplates).length)localStorage.setItem(K+'_certificate_templates',JSON.stringify(r.certificateTemplates));
  if(r.settings)S.settings=r.settings;
  if(r.dioceses)applyDioceses(r.dioceses);
  if(Array.isArray(r.centers))S.centers=r.centers;
  if(Array.isArray(r.dioceseRecords))S.dioceseRecords=r.dioceseRecords;
  if(r.dioceseResolutionReport)S.dioceseResolutionReport=r.dioceseResolutionReport;
  save();
}
function loginFail(m){S.loginError=m;render()}
function loginUser(){let e=document.getElementById('email').value.trim().toLowerCase(),d=document.getElementById('dio').value,p=document.getElementById('upass').value;if(!e||!d||!p){S.loginError='Enter User ID, Diocese, and Password.';return render()}if(!backendAvailable())return loginFail('Connect the Google Apps Script Deploy URL first.');apiCall('loginUserPassword',{email:e,diocese:d,passcode:p},r=>{S.loginError='';S.session={...(r.session||{}),role:'user',email:e,diocese:d};S.f.diocese=d;apiCall('bootstrap',{token:S.session.token},b=>{applyBackendData(b);S.page='register';initReg();msg('User login successful');render()},loginFail)},loginFail)}
function loginAdmin(){let p=document.getElementById('admin').value;if(!backendAvailable())return loginFail('Connect the Google Apps Script Deploy URL first.');apiCall('loginAdmin',{passcode:p},r=>{S.loginError='';S.session={...(r.session||{}),role:'admin',email:(r.session||{}).email||'admin',diocese:''};S.f.diocese='All';apiCall('bootstrap',{token:S.session.token},b=>{applyBackendData(b);S.page='dashboard';msg('Admin login successful');render()},loginFail)},loginFail)}
function logout(){S.session={role:null,email:'',diocese:''};S.loginError='';S.page='home';msg('Logged out','info');render()}
function dash(){
  let st=S.students.length,mc=Object.keys(S.marks).length,ic=new Set(Object.keys(S.marks).map(k=>k.split('_')[1])).size,ga=Object.values(S.marks).filter(m=>m.grade==='A').length;
  let html = `<h1>Mar Thoma Sunday School Samajam</h1><p>Talent Test Management System</p><div class="grid auto"><div class="kpi"><b>${st}</b><span>Participants</span></div><div class="kpi"><b>${mc}</b><span>Marks Entered</span></div><div class="kpi"><b>${ic}</b><span>Events Active</span></div><div class="kpi"><b>${ga}</b><span>Grade A Scores</span></div></div><div class="grid two" style="margin-top:22px"><div class="panel"><h3>Participants by Vakup</h3>${CLS.map(c=>bar(c[1],S.students.filter(s=>s.classId===c[0]).length,st)).join('')}</div><div class="panel"><h3>Top Dioceses</h3>${DIO.map(d=>[d,S.students.filter(s=>s.diocese===d).length]).filter(x=>x[1]).sort((a,b)=>b[1]-a[1]).slice(0,8).map(x=>bar(x[0],x[1],Math.max(1,...DIO.map(d=>S.students.filter(s=>s.diocese===d).length)))).join('')||'<p>No participants yet.</p>'}</div></div>`;
  return html;
}
function bar(l,n,t){return `<div class="sans" style="font-size:12px;margin-bottom:9px"><div style="display:flex;justify-content:space-between"><span>${E(l)}</span><span>${n}</span></div><div style="height:7px;background:var(--m);border-radius:99px"><div style="width:${t?n/t*100:0}%;height:100%;background:var(--t);border-radius:99px"></div></div></div>`}
function blank(c='',g=''){return{name:'',dob:'',gender:g||'Male',classId:c,center:'',sundaySchool:''}}
function initReg(){S.reg={step:S.session.role==='user'?2:1,diocese:S.session.role==='user'?S.session.diocese:'',active:null,rows:[],saved:[],done:false}}
function reg(){if(!S.reg)initReg();let r=S.reg;if(r.done)return `<div class="panel" style="max-width:620px;margin:auto;text-align:center"><h2 style="color:var(--t)">Registration Complete</h2><p>Participants registered for <b>${E(r.diocese)}</b>.</p><button class="btn" onclick="initReg();render()">Register More</button></div>`;return `<h2>Register Participants</h2><div class="toolbar"><span class="tag c">${r.step}. ${['','Select Diocese','Register by Event','Review and Submit'][r.step]}</span></div>${r.step===1?reg1():r.step===2?reg2():reg3()}`}
function reg1(){let r=S.reg;return `<div class="panel" style="max-width:650px"><h3>Select Diocese</h3><div class="grid two">${DIO.map(d=>`<button class="btn ${r.diocese===d?'':'out'}" onclick="S.reg.diocese='${E(d)}';render()">${E(d)}</button>`).join('')}</div><button class="btn" style="width:100%;margin-top:18px" onclick="if(!S.reg.diocese)msg('Please select a Diocese.','err');else{S.reg.step=2;render()}">Next</button></div>`}
function reg2(){let r=S.reg;return `<div class="grid" style="grid-template-columns:minmax(250px,300px) 1fr"><div class="panel events"><span class="tag c">${E(r.diocese)}</span>${S.session.role==='admin'?'<button class="btn out" style="float:right" onclick="S.reg.step=1;render()">Change</button>':''}<h3 style="font-size:13px;margin-top:18px">Events</h3>${(S.programme||ITEMS).map(i=>{let sv=r.saved.find(x=>x.itemId===i.id);return `<button class="${r.active===i.id?'on':sv?'saved':''}" onclick="openItem('${i.id}')"><span>${E(i.name)}</span>${sv?`<span class="tag t">${sv.people.length}</span>`:''}</button>`}).join('')}<button class="btn" style="width:100%;margin-top:12px;display:block;text-align:center;background:var(--c);color:#fff" onclick="confirmReview()">Submit</button></div><div>${r.active?rows():'<div class="panel empty">Select an event from the left.</div>'}</div></div>`}
function confirmReview(){if(!confirm('Kindly recheck before submit.'))return;review()}
function needsGender(i){return (i.genderEl||[]).length>0}
function needsGenderFor(i,c){return (i.genderEl||[]).includes(c)}
function genderCats(i){return i.genderCategories||['Male','Female']}
function categoryFor(i,c,g=''){return needsGenderFor(i,c)?`${g||'Male'} Category`:'Open'}
function eventSlots(i){return (i.el||[]).flatMap(c=>needsGenderFor(i,c)?genderCats(i).map(g=>({classId:c,gender:g,label:`${cn(c)} ${g}`})):[{classId:c,gender:'',label:cn(c)}])}
function eventRows(i,people=[]){return eventSlots(i).flatMap(s=>{let a=people.filter(p=>p.classId===s.classId&&(!s.gender||p.gender===s.gender)).slice(0,2).map(p=>({...p,classId:s.classId,gender:s.gender||p.gender||''}));while(a.length<2)a.push(blank(s.classId,s.gender));return a})}
function openItem(i){let sv=S.reg.saved.find(x=>x.itemId===i),it=(S.programme||ITEMS).find(x=>x.id===i);S.reg.active=i;S.reg.rows=eventRows(it,sv?sv.people:[]);S.reg.slotFilter='All';render()}
function rows(){let r=S.reg,i=(S.programme||ITEMS).find(x=>x.id===r.active),genders=i.genderCategories||i.genderEligible||['Male','Female'],allSlots=[...eventSlots(i)].sort((a,b)=>clsIndex(a.classId)-clsIndex(b.classId)||genders.indexOf(a.gender)-genders.indexOf(b.gender)),filter=r.slotFilter||'All',slots=filter==='All'?allSlots:allSlots.filter(s=>`${s.classId}|${s.gender}`===filter);return `<div class="panel"><h3>${E(i.name)}</h3><p>Two participant entries are available for each eligible category.</p>${allSlots.length>1?`<div class="field" style="max-width:320px;margin-bottom:6px"><label>Select Class</label><select onchange="S.reg.slotFilter=this.value;render()"><option value="All" ${filter==='All'?'selected':''}>All Classes</option>${allSlots.map(s=>{let key=`${s.classId}|${s.gender}`;return `<option value="${E(key)}" ${filter===key?'selected':''}>${E(s.label)}</option>`}).join('')}</select></div>`:''}${slots.map(s=>`<div style="margin:18px 0 8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span class="tag c">${E(cn(s.classId))}</span><span class="tag y">Category: ${E(categoryFor(i,s.classId,s.gender))}</span></div>${r.rows.map((p,n)=>p.classId===s.classId&&(!s.gender||p.gender===s.gender)?`<div class="row"><div class="grid two"><div class="field" style="grid-column:1/-1"><label>Name *</label><input value="${E(p.name)}" oninput="S.reg.rows[${n}].name=this.value"></div><div class="field"><label>DOB</label><input type="date" value="${E(p.dob)}" oninput="S.reg.rows[${n}].dob=this.value"></div><div class="field"><label>Sunday School</label><select onchange="setSchool(${n},this.value)">${schoolOptions(r.diocese,p.sundaySchool)}</select></div><div class="field"><label>Vakup</label><input value="${E(cn(p.classId))}" readonly></div><div class="field"><label>Category</label><input value="${E(categoryFor(i,p.classId,p.gender))}" readonly></div>${needsGenderFor(i,p.classId)?`<div class="field"><label>Gender</label><input value="${E(p.gender||'-')}" readonly></div>`:''}<div class="field"><label>Center</label><input value="${E(p.center)}" readonly></div></div></div>`:'').join('')}`).join('')}<button class="btn" onclick="saveEvent()">Save and Continue</button></div>`}
function review(){if(!S.reg.saved.length)return msg('Register at least one event.','err');S.reg.step=3;render()}
function reg3(){let r=S.reg;return `<div class="panel"><h3>${E(r.diocese)}</h3>${r.saved.map(x=>`<h3 style="font-size:15px">${E(itn(x.itemId))}</h3><div class="wrap"><table><thead><tr><th>#</th><th>Name</th><th>Vakup</th><th>Category</th><th>Gender</th><th>Sunday School</th></tr></thead><tbody>${x.people.map((p,n)=>`<tr><td>${n+1}</td><td>${E(p.name)}</td><td>${E(cn(p.classId))}</td><td>${E(categoryFor((S.programme||ITEMS).find(i=>i.id===x.itemId)||{},p.classId,p.gender))}</td><td>${E(p.gender||'-')}</td><td>${E(p.sundaySchool||'-')}</td></tr>`).join('')}</tbody></table></div>`).join('')}<button class="btn out" onclick="S.reg.step=2;render()">Back</button> <button class="btn" onclick="submitReg()">Submit All</button></div>`}

async function pasteDiagnostics(){
  let box=document.getElementById('diagnosticsData');
  if(!box)return;
  try{
    if(!navigator.clipboard||!navigator.clipboard.readText)throw new Error('Clipboard access unavailable');
    box.value=await navigator.clipboard.readText();
    box.focus();
  }catch(e){
    alert('Clipboard access was blocked. Click inside the Diagnostics box and press Ctrl+V.');
    box.focus();
  }
}
function saveDiagnostics(){

function troubleshootDiagnostics(){
  let box=document.getElementById('diagnosticsData'),result=document.getElementById('diagnosticsResult');
  if(!box||!result)return;
  let raw=box.value.trim();
  if(!raw){result.style.display='block';result.style.color='#b42318';result.textContent='Paste diagnostics data first, then click Troubleshoot.';return}
  try{
    let data=JSON.parse(raw),issues=[],details=[];
    let schools=Array.isArray(data.schools)?data.schools:[],centers=Array.isArray(data.centers)?data.centers:[];
    let norm=value=>String(value||'').trim().toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
    let nameKey=value=>norm(value).replace(/\b(diocese|mar thoma|marthoma)\b/g,'').replace(/\s+/g,' ').trim();
    let field=(row,names)=>{for(let name of names)if(row&&row[name]!=null&&String(row[name]).trim())return row[name];return''};
    let derivedCenterNames=new Set(schools.map(x=>String(field(x,['center','Center','centre','Centre'])).trim()).filter(Boolean));
    let schoolCount=Number.isFinite(Number(data.schoolsCount))?Number(data.schoolsCount):schools.length;
    let reportedCenterCount=Number.isFinite(Number(data.centersCount))?Number(data.centersCount):centers.length;
    let centerCount=Math.max(reportedCenterCount,centers.length,derivedCenterNames.size);
    details.push(`Schools: ${schoolCount}`);
    details.push(`Centers: ${centerCount}${!reportedCenterCount&&derivedCenterNames.size?' (derived from school records)':''}`);
    if(data.sessionRole&&data.sessionRole!=='admin')issues.push(`Session role is “${data.sessionRole}”, not admin.`);
    if(!schoolCount)issues.push('No Sunday School records were loaded.');
    if(!centerCount)issues.push('No Center data was found in either Center records or School records.');
    if(Array.isArray(data.schools)&&schoolCount!==schools.length)issues.push(`School count mismatch: reported ${schoolCount}, received ${schools.length}.`);
    if(reportedCenterCount&&reportedCenterCount!==centers.length)issues.push(`Center count mismatch: reported ${reportedCenterCount}, received ${centers.length}.`);
    let dioceses=Array.isArray(data.DIO)?data.DIO:[];
    if(dioceses.length){
      let records=Array.isArray(data.dioceseRecords)?data.dioceseRecords:[];
      let aliases=new Map();
      dioceses.forEach(d=>{aliases.set(norm(d),d);aliases.set(nameKey(d),d)});
      records.forEach(r=>{
        let recordName=field(r,['name','Name','diocese','Diocese','dioceseName','Diocese Name']);
        let recordCode=field(r,['code','Code','dioceseCode','DioceseCode','Diocese Code']);
        let canonical=dioceses.find(d=>nameKey(d)===nameKey(recordName));
        if(canonical){aliases.set(norm(recordName),canonical);aliases.set(nameKey(recordName),canonical);aliases.set(norm(recordCode),canonical)}
      });
      let used=new Set();
      schools.concat(centers).forEach(x=>{
        let values=[field(x,['diocese','Diocese','dioceseName','Diocese Name']),field(x,['dioceseCode','DioceseCode','Diocese Code','code','Code'])];
        values.forEach(value=>{let canonical=aliases.get(norm(value))||aliases.get(nameKey(value));if(canonical)used.add(canonical)});
      });
      let missing=dioceses.filter(d=>!used.has(d));
      if(missing.length)issues.push(`No school or center data found for: ${missing.join(', ')}.`);
    }
    result.style.display='block';
    result.style.color=issues.length?'#b42318':'#087f7b';
    result.textContent=(issues.length?'⚠ Troubleshooting found '+issues.length+' issue(s):\n• '+issues.join('\n• '):'✓ Diagnostics look healthy. No common frontend data issues found.')+'\n\n'+details.join('  |  ');
  }catch(e){
    result.style.display='block';result.style.color='#b42318';result.textContent='Invalid diagnostics JSON. Check that the complete data was pasted.\n\n'+e.message;
  }
}

function validDeployUrl(value){try{let url=new URL(value);return url.protocol==='https:'&&/script\.google\.com$/i.test(url.hostname)&&/\/macros\/s\/[^/]+\/exec\/?$/i.test(url.pathname)}catch(e){return false}}

function saveBackendConnection(){

  localStorage.setItem(K+'_deploy_url',url);
  try{if(window.TalentBackend){if(typeof window.TalentBackend.setBackendUrl==='function')window.TalentBackend.setBackendUrl(url);else if(typeof window.TalentBackend.saveBackendUrl==='function')window.TalentBackend.saveBackendUrl(url)}}catch(e){}
  backendStatus('✓ Deploy URL saved for future admin use.')
}
function activateDeployUrl(){
  let input=document.getElementById('backendUrl'),url=(input&&input.value||currentDeployUrl()).trim();
  if(!validDeployUrl(url))return backendStatus('Enter a valid Google Apps Script deployment URL first.',true);
  if(input)input.value=url;
  saveBackendConnection();
  let opened=window.open(url,'_blank');if(opened)try{opened.opener=null}catch(e){}
  if(opened)backendStatus('✓ Deploy URL activated and opened in a new tab.');else backendStatus('The URL was saved, but the browser blocked the new tab. Allow pop-ups and try again.',true)
}
function testBackendConnection(){

async function docxText(f){let ab=await f.arrayBuffer(),dv=new DataView(ab),dec=new TextDecoder(),p=0;while(p<ab.byteLength-30){if(dv.getUint32(p,true)!==0x04034b50){p++;continue}let method=dv.getUint16(p+8,true),cs=dv.getUint32(p+18,true),nl=dv.getUint16(p+26,true),xl=dv.getUint16(p+28,true),name=dec.decode(new Uint8Array(ab,p+30,nl)),st=p+30+nl+xl,en=st+cs;if(name==='word/document.xml'){let data=ab.slice(st,en),xml='';if(method===0)xml=dec.decode(data);else{let ds=new Blob([data]).stream().pipeThrough(new DecompressionStream('deflate-raw'));xml=await new Response(ds).text()}return xml.replace(/<w:tab\/>/g,' ').replace(/<w:br\/>/g,'\n').replace(/<\/w:p>/g,'\n').replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/\s+\n/g,'\n').trim()}p=en}throw new Error('No document text')}

rows=function(){let r=S.reg,item=(S.programme||ITEMS).find(row=>(row.id||row.itemId)===r.active),groups=groupedCategories(item);if(!groups.length)return standardRegistrationRows();let filter=r.slotFilter||'All',visible=filter==='All'?groups:groups.filter(group=>group.id===filter);return `<div class="panel"><h3>${E(item.name)}</h3><p>This group item allows two Junior teams and two Senior teams from each Diocese. Select the team's Vakup so its DOB eligibility rule is applied.</p><div class="field" style="max-width:320px;margin-bottom:6px"><label>Select Category</label><select onchange="S.reg.slotFilter=this.value;render()"><option value="All" ${filter==='All'?'selected':''}>All Categories</option>${groups.map(group=>`<option value="${E(group.id)}" ${filter===group.id?'selected':''}>${E(group.label||group.id)}</option>`).join('')}</select></div>${visible.map(group=>`<div style="margin:18px 0 8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span class="tag c">${E(group.label||group.id)}</span><span class="tag y">2 Teams - ${(group.classes||[]).map(cn).map(E).join(' / ')}</span></div>${r.rows.map((person,index)=>person.categoryId===group.id?`<div class="row"><div class="grid two"><div class="field" style="grid-column:1/-1"><label>Team Name *</label><input value="${E(person.name)}" oninput="S.reg.rows[${index}].name=this.value"></div><div class="field"><label>Vakup *</label><select onchange="S.reg.rows[${index}].classId=this.value;S.reg.rows[${index}].dob='';render()">${(group.classes||[]).map(classId=>`<option value="${classId}" ${person.classId===classId?'selected':''}>${E(cn(classId))}</option>`).join('')}</select></div><div class="field"><label>Category</label><input value="${E(group.label||group.id)}" readonly></div><div class="field"><label>DOB *</label><input type="date" value="${E(person.dob)}" oninput="S.reg.rows[${index}].dob=this.value"></div><div class="field"><label>Sunday School *</label><select onchange="setSchool(${index},this.value)">${schoolOptions(r.diocese,person.sundaySchool)}</select></div><div class="field"><label>Center</label><input value="${E(person.center)}" readonly></div></div></div>`:'').join('')}`).join('')}<button class="btn" onclick="saveEvent()">Save and Continue</button></div>`};
saveEvent=function(){let r=S.reg,item=(S.programme||ITEMS).find(row=>(row.id||row.itemId)===r.active),groups=groupedCategories(item),people=r.rows.filter(person=>person.name.trim()).map(person=>needsGenderFor(item,person.classId)?person:{...person,gender:''});if(!people.length)return msg('Enter at least one participant or team.','err');if(people.some(person=>!person.classId))return msg('Vakup is required for every entry.','err');let invalidGroup=people.find(person=>{let group=groups.find(entry=>entry.id===person.categoryId)||groupedCategory(item,person.classId);return group&&!(group.classes||[]).includes(person.classId)});if(invalidGroup)return msg('Select a Vakup allowed for the chosen Divasangeetham category.','err');let dobError=people.filter(person=>!person.categoryId).map(validateParticipantDob).find(Boolean);if(dobError)return msg(dobError,'err');let groupDobError=people.filter(person=>person.categoryId).map(person=>{let rule=((S.settings||{}).dobCriteria||{})[person.classId]||{},label=cn(person.classId);if((rule.from||rule.to)&&!person.dob)return `DOB is required for ${label} (${person.categoryId} category).`;if(rule.from&&person.dob&&person.dob<rule.from)return `${label} DOB must be on or after ${rule.from}.`;if(rule.to&&person.dob&&person.dob>rule.to)return `${label} DOB must be on or before ${rule.to}.`;return''}).find(Boolean);if(groupDobError)return msg(groupDobError,'err');if(people.some(person=>!person.sundaySchool))return msg('Select a Sunday School for every entry.','err');if(people.some(person=>!person.center))return msg('The selected Sunday School has no Center configured in the backend.','err');let overLimit=groups.find(group=>people.filter(person=>person.categoryId===group.id||(group.classes||[]).includes(person.classId)).length>Number(group.limit||2));if(overLimit)return msg(`Only ${overLimit.limit||2} teams are allowed for the ${overLimit.label||overLimit.id} category.`,'err');if(!groups.length&&people.some(person=>people.filter(other=>other.cl r.categoryId===team.categoryId&&normalizedSchoolText(other.sundaySchool)===normalizedSchoolText(team.sundaySchool))!==index);if(duplicateTeam)return msg(`${duplicateTeam.sundaySchool} is already selected for the ${duplicateTeam.categoryId} category.`,'err');let overLimit=groups.find(group=>teams.filter(team=>team.categoryId===group.id).length>Number(group.limit||2));if(overLimit)return msg(`Only ${overLimit.limit||2} teams are allowed for the ${overLimit.label||overLimit.id} category.`,'err');r.saved=r.saved.filter(group=>group.itemId!==r.active);r.saved.push({itemId:r.active,people:teams});r.active=null;msg('Divasangeetham teams saved');render()};

function applyBulkColumnWidths(){let table=document.querySelector('.bulk-mark-table.judge-grid');if(!table)return;let headers=[...table.querySelectorAll('thead th')],saved=savedMarkColumnWidths(table);if(saved&&saved.length===headers.length)headers.forEach((cell,index)=>cell.style.width=saved[index]+'%');if(S.session.role!=='admin'||!S.bulkColumnResize)return;table.classList.add('column-resize-on');headers.slice(0,-1).forEach((cell,index)=>{if(cell.querySelector('.column-resize-handle'))return;let handle=document.createElement('span');handle.className='column-resize-handle';handle.title='Drag to resize column';handle.addEventListener('pointerdown',event=>startMarkColumnResize(event,table,index));cell.appendChild(handle)})}
function startMarkColumnResize(event,table,index){event.preventDefault();event.stopPropagation();let headers=[...table.querySelectorAll('thead th')],left=headers[index],right=headers[index+1],tableWidth=table.getBoundingClientRect().width,startX=event.clientX,leftWidth=left.getBoundingClientRect().width,rightWidth=right.getBoundingClientRect().width,leftMin=index===2?80:34,rightMin=index+1===2?80:34;function move(moveEvent){let delta=moveEvent.clientX-startX,newLeft=Math.max(leftMin,Math.min(leftWidth+rightWidth-rightMin,leftWidth+delta)),newRight=leftWidth+rightWidth-newLeft;left.style.width=newLeft/tableWidth*100+'%';right.style.width=newRight/tableWidth*100+'%'}function stop(){document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',stop);storeMarkColumnWidths(table,headers.map(cell=>cell.getBoundingClientRect().width/tableWidth*100))}document.addEventListener('pointermove',move);document.addEventListener('pointerup',stop)}

openParticipantIdCards=function(autoPrint){let selected=(document.getElementById('idCardParticipant')||{}).value||'all',students=selected==='all'?S.students:S.students.filter(s=>s.id===selected);if(!students.length)return msg('No participants selected.','err');let year=String((S.settings||{}).programmeYear||new Date().getFullYear()).toUpperCase(),card=s=>{let items=(s.items||[]).map(id=>(S.programme||ITEMS).find(i=>(i.id||i.itemId)===id)).filter(Boolean).map(i=>i.name).join(', ');return `<section class="card"><i class="crop tl"></i><i class="crop tr"></i><i class="crop bl"></i><i class="crop br"></i><header>MAR THOMA SUNDAY SCHOOL SAMAJAM<br>TALENT TEST - ${E(year)}</header><div class="title">PARTICIPANT ID CARD</div><div class="reg">${E(s.regNo)}</div><div class="items"><b>ITEMS:</b> ${E(items||'-')}</div></section>`},sheets=[];for(let i=0;i<students.length;i+=6)sheets.push(`<main class="sheet">${students.slice(i,i+6).map(card).join('')}</main>`);let html=`<!doctype html><html><head><meta charset="utf-8"><title>Participant ID Cards</title><style>*{box-sizing:border-box}html,body{margin:0;padding:0;font-family:Arial,sans-serif;background:#d9d9d9;color:#111}.actions{position:fixed;right:12px;top:12px;z-index:5}.actions button{border:0;border-radius:7px;padding:9px 15px;background:#9B1C2E;color:white;font:700 13px Arial,sans-serif}.sheet{width:210mm;height:297mm;margin:8mm auto;padding:8mm;display:grid;grid-template-columns:repeat(2,97mm);grid-template-rows:repeat(3,93.66mm);background:#fff;overflow:hidden;page-break-after:always}.sheet:last-of-type{page-break-after:auto}.card{position:relative;width:97mm;height:93.66mm;padding:7mm 7mm 5mm;overflow:hidden;text-align:center;border:.2mm dashed #888;background:#fff;font:12pt Arial,sans-serif}.crop{position:absolute;width:4mm;height:4mm;pointer-events:none}.crop.tl{left:-.2mm;top:-.2mm;border-left:.35mm solid #000;border-top:.35mm solid #000}.crop.tr{right:-.2mm;top:-.2mm;border-right:.35mm solid #000;border-top:.35mm solid #000}.crop.bl{left:-.2mm;bottom:-.2mm;border-left:.35mm solid #000;border-bottom:.35mm solid #000}.crop.br{right:-.2mm;bottom:-.2mm;border-right:.35mm solid #000;border-bottom:.35mm solid #000}header{color:#9B1C2E;font:700 14pt Arial,sans-serif;line-height:1.2;margin-bottom:4mm}.title{background:#9B1C2E;color:#fff;font:700 12pt Arial,sans-serif;padding:2mm;margin-bottom:3mm}.reg{font:700 100pt Arial,sans-serif;color:#111;line-height:.9;white-space:nowrap;margin:1mm 0 3mm}.items{font:12pt Arial,sans-serif;line-height:1.3;margin-top:2mm;overflow-wrap:anywhere}@page{size:A4 portrait;margin:0}@media print{html,body{background:#fff}.actions{display:none}.sheet{margin:0;page-break-after:always}.sheet:last-of-type{page-break-after:auto}}</style></head><body><div class="actions"><button onclick="print()">🖨 Print A4</button></div>${sheets.join('')}${autoPrint?'<script>addEventListener("load",()=>print())<\/script>':''}</body></html>`;let w=window.open('','_blank');if(!w)return msg('Allow popups to preview ID cards.','err');w.document.write(html);w.document.close()};
